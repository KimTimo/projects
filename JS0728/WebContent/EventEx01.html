<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이벤트 연결하기</title>
<script type="text/javascript">
    window.onload = function() {
		document.getElementById("header1").onclick = function() {
			alert(this.innerHTML);
		}
		
		var header2 = document.getElementById("header2");
		header2.onclick = function() {
			alert(this.innerHTML);
			// 이벤트 제거
			header2.onclick = null;
			// 커서모양 변경
			header2.style.cursor = 'default';
		}
		
		document.getElementById("header3").onclick = function() {
			alert(this.innerHTML);
			// 이벤트 제거
			header2.onclick = null;
			// 커서모양 변경
			header2.style.cursor = 'default';
			header2.style.color = 'skyblue';
			header2.style.backgroundColor = 'yellow';
			
		}
		
	}
</script>
<style type="text/css">
    #header1, #header2{
        cursor: crosshair;
    }
</style>
</head>
<body>
    <h1 id="header1">눌러봐1</h1>
    <h1 id="header2">눌러봐2(나는 한번만 클릭된다우)</h1>
    <h1 id="header3">눌러봐3(나는 한번만 클릭된다우)</h1>

</body>
</html>
